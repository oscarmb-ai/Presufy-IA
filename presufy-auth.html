<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presufy — Acceder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f8f5;--white:#fff;--border:#e2e5d8;--accent:#2d6a2d;--alight:#e8f4e8;--amid:#4a9e4a;--text:#1a1f17;--muted:#6b7260;--danger:#c0392b;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.top{background:var(--white);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--accent)}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.card-top{background:linear-gradient(135deg,#3a8a3a,#1e5c1e);padding:28px 32px;text-align:center}
.card-top h1{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff;margin-bottom:4px}
.card-top p{font-size:13px;color:rgba(255,255,255,.75)}
.card-body{padding:28px 32px}
.tabs{display:flex;background:var(--bg);border-radius:var(--rs);padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:9px;border:none;background:transparent;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border-radius:6px;color:var(--muted);transition:.2s}
.tab.on{background:var(--white);color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.form-group input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:11px 13px;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:.15s}
.form-group input:focus{border-color:var(--amid);box-shadow:0 0 0 3px rgba(45,106,45,.08);background:#fff}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:'Syne',sans-serif;font-weight:800;font-size:15px;padding:14px;cursor:pointer;transition:.2s;margin-top:4px}
.btn:hover{background:var(--amid);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{width:100%;background:var(--white);border:1.5px solid var(--border);color:var(--text);border-radius:var(--rs);font-family:'Inter',sans-serif;font-weight:600;font-size:14px;padding:12px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{border-color:var(--accent);background:var(--alight)}
.err{background:#fef2f2;border:1px solid #fecaca;color:var(--danger);border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.ok{background:var(--alight);border:1px solid rgba(45,106,45,.2);color:var(--accent);border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.forgot{text-align:right;font-size:12px;color:var(--muted);margin-top:-8px;margin-bottom:14px}
.forgot a{color:var(--accent);text-decoration:none}
.terms{font-size:11px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6}
.terms a{color:var(--accent);text-decoration:none}
.strength{height:4px;border-radius:2px;margin-top:6px;background:var(--border);overflow:hidden}
.strength-fill{height:100%;border-radius:2px;width:0%;transition:.3s}
.strength-text{font-size:11px;margin-top:4px}
</style>
</head>
<body>
<div class="top">
  <a href="presufy.html" class="logo">
    <div style="width:32px;height:32px;background:linear-gradient(135deg,#3a8a3a,#1e5c1e);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px">📄</div>
    <span class="logo-name">Presufy</span>
  </a>
  <a href="presufy.html" style="font-size:13px;color:var(--muted);text-decoration:none">← Volver</a>
</div>

<div class="wrap">
  <div class="card">
    <div class="card-top">
      <h1 id="card-title">Bienvenido a Presufy</h1>
      <p id="card-sub">Accede a tu cuenta o crea una nueva</p>
    </div>
    <div class="card-body">
      <div class="tabs">
        <button class="tab on" id="tab-login" onclick="showTab('login')">Iniciar sesión</button>
        <button class="tab" id="tab-register" onclick="showTab('register')">Crear cuenta</button>
      </div>

      <div id="err-msg" class="err"></div>
      <div id="ok-msg" class="ok"></div>

      <!-- LOGIN -->
      <div id="pane-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="l-email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="forgot"><a href="#" onclick="showForgot();return false">¿Olvidaste tu contraseña?</a></div>
        <button class="btn" id="btn-login" onclick="doLogin()">Entrar en Presufy →</button>
        <div class="divider">o</div>
        <button class="btn-google" onclick="doGoogle()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
          Continuar con Google
        </button>
      </div>

      <!-- REGISTER -->
      <div id="pane-register" style="display:none">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" id="r-name" placeholder="Carlos García" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="r-email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="r-pass" placeholder="Mínimo 8 caracteres" oninput="checkStrength(this.value)" autocomplete="new-password">
          <div class="strength"><div class="strength-fill" id="str-fill"></div></div>
          <div class="strength-text" id="str-text"></div>
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" id="r-pass2" placeholder="Repite tu contraseña" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <button class="btn" id="btn-register" onclick="doRegister()">Crear mi cuenta gratis →</button>
        <div class="terms">Al registrarte aceptas los <a href="presufy-legal.html#terminos">Términos de uso</a> y la <a href="presufy-legal.html#privacidad">Política de privacidad</a></div>
      </div>

      <!-- FORGOT -->
      <div id="pane-forgot" style="display:none">
        <p style="font-size:14px;color:var(--muted);margin-bottom:16px">Introduce tu email y te enviaremos las instrucciones para restablecer tu contraseña.</p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="f-email" placeholder="tu@email.com">
        </div>
        <button class="btn" onclick="doForgot()">Enviar instrucciones</button>
        <button onclick="showTab('login')" style="width:100%;background:none;border:none;color:var(--muted);font-size:13px;padding:10px;cursor:pointer;margin-top:4px">← Volver al login</button>
      </div>
    </div>
  </div>
</div>

<script>
// ——— SIMPLE AUTH con localStorage (simula backend) ———
// En producción esto debe ir en un servidor real

function showTab(t) {
  ['login','register','forgot'].forEach(p => {
    document.getElementById('pane-'+p).style.display = p===t ? 'block' : 'none';
  });
  ['login','register'].forEach(b => {
    const el = document.getElementById('tab-'+b);
    if (el) el.classList.toggle('on', b===t);
  });
  clearMsg();
  const titles = { login:['Bienvenido de nuevo','Accede a tu cuenta de Presufy'], register:['Crear cuenta gratis','7 días gratis, sin tarjeta'], forgot:['Recuperar contraseña','Te enviaremos un enlace por email'] };
  document.getElementById('card-title').textContent = titles[t]?.[0] || '';
  document.getElementById('card-sub').textContent = titles[t]?.[1] || '';
}

function showForgot() { showTab('forgot'); }

function showErr(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('ok-msg').style.display = 'none';
}
function showOk(msg) {
  const el = document.getElementById('ok-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('err-msg').style.display = 'none';
}
function clearMsg() {
  document.getElementById('err-msg').style.display = 'none';
  document.getElementById('ok-msg').style.display = 'none';
}

function hashPass(pass) {
  // Simple hash para demo (en producción usar bcrypt en servidor)
  let hash = 0;
  for (let i = 0; i < pass.length; i++) { hash = ((hash << 5) - hash) + pass.charCodeAt(i); hash |= 0; }
  return 'h' + Math.abs(hash).toString(36) + pass.length;
}

function getUsers() { try { return JSON.parse(localStorage.getItem('presufy_users') || '[]'); } catch { return []; } }
function saveUsers(u) { localStorage.setItem('presufy_users', JSON.stringify(u)); }
function setSession(user) {
  localStorage.setItem('presufy_session', JSON.stringify({ id: user.id, name: user.name, email: user.email, plan: user.plan || 'free', ts: Date.now() }));
}
function getSession() { try { return JSON.parse(localStorage.getItem('presufy_session') || 'null'); } catch { return null; } }

function doLogin() {
  const email = document.getElementById('l-email').value.trim().toLowerCase();
  const pass  = document.getElementById('l-pass').value;
  if (!email) { showErr('Introduce tu email.'); return; }
  if (!pass)  { showErr('Introduce tu contraseña.'); return; }
  const users = getUsers();
  const user  = users.find(u => u.email === email);
  if (!user || user.passHash !== hashPass(pass)) { showErr('Email o contraseña incorrectos.'); return; }
  setSession(user);
  showOk('✓ Sesión iniciada. Redirigiendo…');
  setTimeout(() => { window.location.href = 'presufy.html'; }, 1000);
}

function doRegister() {
  const name  = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim().toLowerCase();
  const pass  = document.getElementById('r-pass').value;
  const pass2 = document.getElementById('r-pass2').value;
  if (!name)  { showErr('Introduce tu nombre.'); return; }
  if (!email || !email.includes('@')) { showErr('Introduce un email válido.'); return; }
  if (pass.length < 8) { showErr('La contraseña debe tener al menos 8 caracteres.'); return; }
  if (pass !== pass2) { showErr('Las contraseñas no coinciden.'); return; }
  const users = getUsers();
  if (users.find(u => u.email === email)) { showErr('Ya existe una cuenta con ese email. ¿Quieres iniciar sesión?'); return; }
  const newUser = { id: Date.now().toString(), name, email, passHash: hashPass(pass), plan: 'free', createdAt: new Date().toISOString() };
  users.push(newUser);
  saveUsers(users);
  setSession(newUser);
  showOk('✓ Cuenta creada. Redirigiendo…');
  setTimeout(() => { window.location.href = 'presufy.html'; }, 1000);
}

function doGoogle() {
  // Simulación de Google Auth (en producción usar Firebase Auth o similar)
  const email = prompt('Demo de Google Auth — Introduce tu email de Google:');
  if (!email || !email.includes('@')) return;
  const users = getUsers();
  let user = users.find(u => u.email === email.toLowerCase());
  if (!user) {
    user = { id: Date.now().toString(), name: email.split('@')[0], email: email.toLowerCase(), passHash: '', plan: 'free', provider: 'google', createdAt: new Date().toISOString() };
    users.push(user); saveUsers(users);
  }
  setSession(user);
  showOk('✓ Sesión iniciada con Google. Redirigiendo…');
  setTimeout(() => { window.location.href = 'presufy.html'; }, 1000);
}

function doForgot() {
  const email = document.getElementById('f-email').value.trim();
  if (!email || !email.includes('@')) { showErr('Introduce un email válido.'); return; }
  const users = getUsers();
  if (!users.find(u => u.email === email.toLowerCase())) { showErr('No encontramos ninguna cuenta con ese email.'); return; }
  showOk('✓ Te hemos enviado las instrucciones a ' + email + '. Revisa tu bandeja de entrada.');
}

function checkStrength(pass) {
  const fill = document.getElementById('str-fill');
  const text = document.getElementById('str-text');
  let score = 0;
  if (pass.length >= 8) score++;
  if (pass.length >= 12) score++;
  if (/[A-Z]/.test(pass)) score++;
  if (/[0-9]/.test(pass)) score++;
  if (/[^A-Za-z0-9]/.test(pass)) score++;
  const levels = [
    { w:'0%', c:'#e2e5d8', t:'' },
    { w:'25%', c:'#e53e3e', t:'🔴 Muy débil' },
    { w:'50%', c:'#e67e22', t:'🟠 Débil' },
    { w:'75%', c:'#f59e0b', t:'🟡 Aceptable' },
    { w:'90%', c:'#4a9e4a', t:'🟢 Buena' },
    { w:'100%', c:'#2d6a2d', t:'🟢 Excelente' },
  ];
  const l = levels[score] || levels[0];
  fill.style.width = l.w; fill.style.background = l.c;
  text.textContent = l.t; text.style.color = l.c;
}

// Redirigir si ya hay sesión activa
const sess = getSession();
if (sess && Date.now() - sess.ts < 30*24*60*60*1000) {
  window.location.href = 'presufy.html';
}
</script>
</body>
</html>
